version: '3.8'

services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      ai-service:
        condition: service_healthy
    restart: unless-stopped

  ai-service:
    build:
      context: ./services/ai
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - AI_SERVICE_SECRET=hx-internal-secret-key
      - TEMP_AUDIO_DIR=/tmp/audio
      - NEXTJS_INTERNAL_URL=http://nextjs:3000
    volumes:
      - ai-temp-audio:/tmp/audio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  ai-temp-audio:
